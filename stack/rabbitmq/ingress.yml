---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: mtls-strict
  namespace: stack
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  minVersion: VersionTLS12
  clientAuth:
    clientAuthType: RequireAndVerifyClientCert
    secretNames:
      - monster-ca-trust

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rabbitmq
  namespace: stack
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rabbitmq.svc.k8s.monster.lab`)
      kind: Rule
      services:
        - name: rabbitmq
          port: 15672
  tls:
    secretName: monster-server-cert
    options:
      name: mtls-strict
      namespace: stack
