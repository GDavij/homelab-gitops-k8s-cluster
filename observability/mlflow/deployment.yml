---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: observability
  labels:
    app: mlflow
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.10.0-full
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
          command:
            - mlflow
            - server
            - "--host=0.0.0.0"
            - "--port=5000"
            - "--backend-store-uri=$(MLFLOW_DB_URL)"
            - "--default-artifact-root=s3://mlflow-artifacts/"
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: MLFLOW_DB_URL
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: MLFLOW_DB_URL
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.storage.svc:9000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
