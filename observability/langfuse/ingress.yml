---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: langfuse
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`langfuse.svc.k8s.monster.lab`)
      kind: Rule
      services:
        - name: langfuse-web
          port: 3000
  tls:
    secretName: monster-server-cert
    options:
      name: mtls-strict
      namespace: observability
