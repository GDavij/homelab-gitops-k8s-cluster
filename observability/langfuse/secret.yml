---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langfuse-secrets
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: langfuse-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: secret/data/observability/langfuse
        property: NEXTAUTH_SECRET
    - secretKey: SALT
      remoteRef:
        key: secret/data/observability/langfuse
        property: SALT
    - secretKey: LANGFUSE_DB_URL
      remoteRef:
        key: secret/data/database/postgres
        property: LANGFUSE_DB_URL
