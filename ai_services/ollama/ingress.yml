---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: mtls-strict
  namespace: ai-services
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  minVersion: VersionTLS12
  clientAuth:
    clientAuthType: RequireAndVerifyClientCert
    secretNames:
      - monster-ca-trust

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ollama
  namespace: ai-services
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ollama.svc.k8s.monster.lab`)
      kind: Rule
      services:
        - name: ollama
          port: 11434
  tls:
    secretName: monster-server-cert
    options:
      name: mtls-strict
      namespace: ai-services
