---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: mtls-strict
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  minVersion: VersionTLS12
  clientAuth:
    clientAuthType: RequireAndVerifyClientCert
    secretNames:
      - monster-ca-trust

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`minio.svc.k8s.monster.lab`)
      kind: Rule
      services:
        - name: minio
          port: 9001
  tls:
    secretName: monster-server-cert
    options:
      name: mtls-strict
      namespace: storage

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-api
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`s3.svc.k8s.monster.lab`)
      kind: Rule
      services:
        - name: minio
          port: 9000
  tls:
    secretName: monster-server-cert
    options:
      name: mtls-strict
      namespace: storage
