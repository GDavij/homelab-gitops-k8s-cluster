---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder
  namespace: ci-cd
  labels:
    app: coder
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coder
  template:
    metadata:
      labels:
        app: coder
    spec:
      serviceAccountName: coder
      containers:
        - name: coder
          image: ghcr.io/coder/coder:v2.29.7
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: CODER_PG_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: coder-secrets
                  key: CODER_PG_CONNECTION_URL
            - name: CODER_HTTP_ADDRESS
              value: "0.0.0.0:3000"
            - name: CODER_ACCESS_URL
              value: "http://coder.ci-cd.svc:3000"
            - name: CODER_MAX_TOKEN_LIFETIME
              value: "24h"
            - name: CODER_AUTOBUILD_POLL_INTERVAL
              value: "1m"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
