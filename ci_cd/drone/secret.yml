---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: drone-secrets
  namespace: ci-cd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: drone-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DRONE_RPC_SECRET
      remoteRef:
        key: secret/data/ci-cd/drone
        property: DRONE_RPC_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DRONE_GITEA_CLIENT_ID
      remoteRef:
        key: secret/data/ci-cd/drone
        property: DRONE_GITEA_CLIENT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DRONE_GITEA_CLIENT_SECRET
      remoteRef:
        key: secret/data/ci-cd/drone
        property: DRONE_GITEA_CLIENT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: DRONE_DB_URL
      remoteRef:
        key: secret/data/database/postgres
        property: DRONE_DB_URL
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
