---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: no-client-cert
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  minVersion: VersionTLS12
  clientAuth:
    clientAuthType: NoClientCert

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: postgres
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`postgres.svc.k8s.monster.lab`)
      services:
        - name: postgres
          port: 5432
  tls:
    secretName: monster-server-cert
    options:
      name: no-client-cert
      namespace: database
