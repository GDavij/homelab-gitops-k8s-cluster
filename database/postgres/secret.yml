---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/database/postgres
        property: POSTGRES_PASSWORD
    - secretKey: CODER_DB_PASSWORD
      remoteRef:
        key: secret/data/database/postgres
        property: CODER_DB_PASSWORD
    - secretKey: CODER_DB_URL
      remoteRef:
        key: secret/data/database/postgres
        property: CODER_DB_URL
    - secretKey: MLFLOW_DB_PASSWORD
      remoteRef:
        key: secret/data/database/postgres
        property: MLFLOW_DB_PASSWORD
    - secretKey: MLFLOW_DB_URL
      remoteRef:
        key: secret/data/database/postgres
        property: MLFLOW_DB_URL
    - secretKey: LANGFUSE_DB_PASSWORD
      remoteRef:
        key: secret/data/database/postgres
        property: LANGFUSE_DB_PASSWORD
    - secretKey: LANGFUSE_DB_URL
      remoteRef:
        key: secret/data/database/postgres
        property: LANGFUSE_DB_URL
    - secretKey: GITEA_DB_PASSWORD
      remoteRef:
        key: secret/data/database/postgres
        property: GITEA_DB_PASSWORD
    - secretKey: DRONE_DB_PASSWORD
      remoteRef:
        key: secret/data/database/postgres
        property: DRONE_DB_PASSWORD
    - secretKey: DRONE_DB_URL
      remoteRef:
        key: secret/data/database/postgres
        property: DRONE_DB_URL
